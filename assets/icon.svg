<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background Gradient for 3D Squircle -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3A3C"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>

    <!-- Inner glass border -->
    <linearGradient id="innerBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Deep 3D Drop Shadow for the Cube -->
    <filter id="cubeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="25" stdDeviation="25" flood-color="#000000" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Subtle shadow for sparkles -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- macOS Icon Drop Shadow (Applied to the whole squircle) -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Wrapping everything to scale down to 824x824 (Apple's standard size inside the 1024 canvas) -->
  <g transform="translate(512, 512) scale(0.805) translate(-512, -512)">
    
    <!-- Base Squircle with the native macOS drop shadow -->
    <g filter="url(#iconShadow)">
      <rect width="1024" height="1024" rx="230" fill="url(#bgGrad)" />
      <rect x="4" y="4" width="1016" height="1016" rx="226" fill="none" stroke="url(#innerBorder)" stroke-width="6" />
    </g>

    <!-- Notion AI Style Sparkles -->
    <g fill="#FFFFFF" filter="url(#softShadow)">
      <path d="M 0 -40 Q 0 0 40 0 Q 0 0 0 40 Q 0 0 -40 0 Q 0 0 0 -40 Z" transform="translate(180, 200) scale(0.7)" />
      <path d="M 0 -30 Q 0 0 30 0 Q 0 0 0 30 Q 0 0 -30 0 Q 0 0 0 -30 Z" transform="translate(840, 220) scale(0.9)" />
      <path d="M 0 -20 Q 0 0 20 0 Q 0 0 0 20 Q 0 0 -20 0 Q 0 0 0 -20 Z" transform="translate(200, 840) scale(0.8)" />
      <path d="M 0 -25 Q 0 0 25 0 Q 0 0 0 25 Q 0 0 -25 0 Q 0 0 0 -25 Z" transform="translate(840, 800) scale(0.6)" />
    </g>

    <!-- The Isometric 3D Notebook -->
    <g transform="translate(512, 512) scale(1.35) translate(-512, -512)" filter="url(#cubeShadow)">
      
      <!-- Right Face Solid White Fill -->
      <polygon points="512,512 752,372 752,652 512,792" fill="#FFFFFF" />

      <!-- Left Face Pages (White stripes) -->
      <!-- Matrix: Origin at (512, 512). X -> (272, 372). Y -> (512, 792) -->
      <g transform="matrix(-2.4, -1.4, 0, 2.8, 512, 512)" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round">
        <line x1="15" y1="20" x2="85" y2="20" />
        <line x1="15" y1="40" x2="85" y2="40" />
        <line x1="15" y1="60" x2="85" y2="60" />
        <line x1="15" y1="80" x2="85" y2="80" />
      </g>

      <!-- Right Face Apple Pencil (Black silhouette) -->
      <!-- Matrix: Origin at (512, 512). X -> (752, 372). Y -> (512, 792) -->
      <g transform="matrix(2.4, -1.4, 0, 2.8, 512, 512)">
        <g transform="translate(50, 50) rotate(35) translate(-50, -50)" fill="#111111">
          <path d="M 42 10 C 42 0, 58 0, 58 10 L 58 65 L 42 65 Z" />
          <polygon points="42,68 58,68 53,88 47,88" />
          <path d="M 47 91 L 53 91 L 51 96 Q 50 98 49 96 Z" />
        </g>
      </g>

      <!-- Wireframe Outline (White) -->
      <g fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
        <!-- Outer Perimeter -->
        <polygon points="512,232 752,372 752,652 512,792 272,652 272,372" />
        <!-- Inner Y -->
        <path d="M 272 372 L 512 512 L 752 372 M 512 512 L 512 792" />
      </g>
    </g>
  </g>
</svg>
