<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src ws://localhost:1234 http://localhost:1234 wss://*.fly.dev https://*.fly.dev">
  <title>InviNotes</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <!-- Notion-style top bar -->
    <div id="titlebar">
      <span id="title">InviNotes</span>
      <div id="titlebar-controls">
        <span id="click-through-badge" class="hidden">Click-through</span>
        <label id="opacity-label">
          <input type="range" id="opacity-slider" min="10" max="100" value="85" step="5">
        </label>
        <div id="connection-status">
          <span id="status-dot" class="status-dot"></span>
          <span id="status-text"></span>
        </div>
        <div id="peers"></div>
        <button id="btn-share" class="share-btn" title="Share & collaborate">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 5.5V11a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M10 1.5h4.5V6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M14.5 1.5L8.5 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Share
        </button>
        <button id="btn-minimize" title="Hide (Ctrl+Shift+N)">&#x2013;</button>
        <button id="btn-close" title="Close">&times;</button>
      </div>
    </div>

    <!-- Share dropdown (Notion-style) -->
    <div id="share-dropdown" class="hidden">
      <div id="share-dropdown-inner">
        <!-- Not in room: create or join -->
        <div id="share-not-connected">
          <div class="share-section">
            <div class="share-row">
              <input type="text" id="join-input" placeholder="Paste room ID or invite link..." />
              <button id="btn-join-room" class="share-action-btn">Join</button>
            </div>
          </div>
          <div class="share-divider"></div>
          <div class="share-section">
            <button id="btn-new-room" class="share-create-btn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Create new room
            </button>
          </div>
        </div>
        <!-- In room: room info -->
        <div id="share-connected" class="hidden">
          <div class="share-section">
            <div class="share-section-label">Connected peers</div>
            <div id="share-peers-list"></div>
          </div>
          <div class="share-divider"></div>
          <div class="share-section share-footer">
            <span id="room-id-display" class="share-room-id"></span>
            <div class="share-footer-actions">
              <button id="btn-copy-link" class="share-footer-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5l-1 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Copy link
              </button>
              <button id="btn-disconnect" class="share-footer-btn danger">Leave</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Keep room-panel ID for JS compatibility (hidden) -->
    <div id="room-panel" class="hidden"></div>

    <!-- Formatting toolbar (hidden, kept for keyboard shortcut compatibility) -->
    <div id="toolbar">
      <button data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button data-action="strike" title="Strikethrough"><s>S</s></button>
      <button data-action="h1" title="Heading 1">H1</button>
      <button data-action="h2" title="Heading 2">H2</button>
      <button data-action="h3" title="Heading 3">H3</button>
      <button data-action="bullet-list" title="Bullet List">&#8226;</button>
      <button data-action="ordered-list" title="Ordered List">1.</button>
      <button data-action="blockquote" title="Quote">&#8220;</button>
      <button data-action="code-block" title="Code Block">&lt;/&gt;</button>
      <button data-action="divider" title="Horizontal Rule">&#8212;</button>
      <button data-action="undo" title="Undo">&#8617;</button>
      <button data-action="redo" title="Redo">&#8618;</button>
    </div>

    <!-- Editor area -->
    <div id="editor-wrapper">
      <div id="editor"></div>
    </div>

    <!-- Slash command menu (Notion-style) -->
    <div id="slash-menu"></div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
