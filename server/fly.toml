# fly.toml app configuration file generated for invinotes-server on 2026-04-29T02:00:44-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'invinotes-server'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data/yjs-docs'
  SERVER_BASE_URL = 'wss://invinotes-server.fly.dev'

[[mounts]]
  source = 'invinotes_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
